name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check if version is already published
        id: version-check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME@$LOCAL_VERSION" version 2>/dev/null || echo "")
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $LOCAL_VERSION is already published. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $LOCAL_VERSION (not yet on npm)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck
        if: steps.version-check.outputs.skip != 'true'
        run: npm run typecheck

      - name: Lint
        if: steps.version-check.outputs.skip != 'true'
        run: npm run lint

      - name: Test
        if: steps.version-check.outputs.skip != 'true'
        run: npm run test

      - name: Install Playwright browsers
        if: steps.version-check.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: steps.version-check.outputs.skip != 'true'
        run: npm run test:e2e

      - name: Build package
        if: steps.version-check.outputs.skip != 'true'
        run: npm run build

      - name: Publish package
        if: steps.version-check.outputs.skip != 'true'
        run: npm publish --provenance --access public --tag rc
